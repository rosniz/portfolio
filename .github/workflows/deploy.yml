name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  # ─── Backend : deploy sur VPS ─────────────────────────────────
  deploy-backend:
    name: Deploy Backend (VPS)
    runs-on: ubuntu-latest

    steps:
      - name: SSH → git pull + rebuild Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "=== Pull latest code ==="
            cd /opt/portfolio-backend
            git fetch origin main
            git reset --hard origin/main

            echo "=== Rebuild & restart container ==="
            cd backend
            docker compose -f docker-compose.prod.yml up -d --build --force-recreate

            echo "=== Health check ==="
            sleep 8
            curl -sf https://api.rosnifombeu.com/api/ || exit 1

            echo "=== Deploy SUCCESS ==="

  # ─── Frontend : Netlify s'en charge automatiquement ───────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: always()
    steps:
      - name: Status
        run: |
          if [ "${{ needs.deploy-backend.result }}" == "success" ]; then
            echo "✅ Backend déployé sur api.rosnifombeu.com"
            echo "✅ Frontend redéployé par Netlify automatiquement"
          else
            echo "❌ Échec du déploiement backend"
            exit 1
          fi
