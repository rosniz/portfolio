server {
    listen 80;
    server_name api-portfolio.visiontechsarl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-portfolio.visiontechsarl.com;

    ssl_certificate     /etc/letsencrypt/live/api-portfolio.visiontechsarl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-portfolio.visiontechsarl.com/privkey.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /app/portfolio/staticfiles/;
    }

    location /media/ {
        alias /app/portfolio/media/;
    }

    location / {
        proxy_pass         http://portfolio_web:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
